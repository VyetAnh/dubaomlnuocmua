services:
  - type: web
    name: esp32-weather-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: FIREBASE_CRED_JSON
        sync: false
      - key: FIREBASE_DB_URL
        sync: false
      - key: DEFAULT_LAT
        value: "21.0285"
      - key: DEFAULT_LON
        value: "105.8542"
      - key: POLL_INTERVAL
        value: "30"
    autoDeploy: true
